name: Build Quartz Site

on:
  push:
    branches:
      - main
    paths:
      - content/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        # Downloads the repo on the VM
      - name: Checkout
        uses: actions/checkout@v6

        # Prepares the VM environment for deployment
      - name: Setup Pages
        uses: actions/configure-pages@v5

        # Builds the website from markdown files using Quartz
      - name: Build
        uses: konstfish/quartz-build-action@v7
        with:
          source: content                               # The directory to build from
          destination: public                           # The directory to write output into
          page_title: "Kiwi Docs"                       # Title of resulting Quartz Page
          quartz_config: quartz/quartz.config.ts        # Path to custom Quartz config file
          quartz_icon: static/Favicon.png               # Path to custom Quartz config file
          quartz_custom_css: quartz/quartz_custom.scss  # Path to custom Quartz Page css

      - name: Debug workspace
        run: |
          echo "Current path:"
          pwd
          echo "Full directory listing:"
          ls -la
          echo "Recursive view:"
          ls -R

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages